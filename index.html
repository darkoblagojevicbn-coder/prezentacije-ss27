<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prezentacije SS27</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--border2:#484f58;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --blue:#1f6feb;--blue2:#388bfd;--blue-light:#1d4ed8;
  --green:#238636;--green2:#2ea043;--green-light:#dcfce7;
  --orange:#d97706;--orange2:#f59e0b;
  --red:#da3633;--red2:#f85149;
  --purple:#6e40c9;--purple2:#8b5cf6;
  --teal:#0f766e;--teal2:#14b8a6;
  --boba-bg:#6A1B9A;--mili-bg:#00796B;--bane-bg:#E65100;--svi-bg:#1565C0;
  --radius:8px;--radius-sm:6px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
button{cursor:pointer;font-family:inherit;font-size:13px;border:none;outline:none}
input,select,textarea{font-family:inherit;font-size:13px;outline:none}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.login-box{width:100%;max-width:380px}
.login-logo{text-align:center;margin-bottom:2rem}
.login-logo i{font-size:40px;color:var(--blue2)}
.login-logo h1{font-size:22px;font-weight:600;margin-top:10px;color:var(--text)}
.login-logo p{color:var(--text2);font-size:13px;margin-top:4px}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.user-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 12px;color:var(--text);transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px}
.user-btn:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-1px)}
.user-btn.full{grid-column:1/-1}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff}
.user-btn span{font-weight:600;font-size:13px}

/* ── APP ── */
#app-screen{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1rem;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar-logo{font-weight:600;font-size:15px;color:var(--text);display:flex;align-items:center;gap:8px}
.topbar-logo i{color:var(--blue2)}
.topbar-user{display:flex;align-items:center;gap:6px;margin-left:auto}
.avatar-sm{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff}
.nav-tabs{display:flex;gap:4px;margin-left:1rem}
.nav-tab{background:none;color:var(--text2);padding:6px 12px;border-radius:var(--radius-sm);font-size:13px;transition:all .15s}
.nav-tab:hover{background:var(--bg3);color:var(--text)}
.nav-tab.active{background:var(--bg3);color:var(--text)}
.btn-add{background:var(--green);color:#fff;padding:6px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;transition:background .15s;margin-left:auto}
.btn-add:hover{background:var(--green2)}
.btn-add.hidden{display:none}
.logout-btn{background:none;color:var(--text2);padding:6px 8px;border-radius:var(--radius-sm)}
.logout-btn:hover{background:var(--bg3);color:var(--text)}

.main-content{flex:1;padding:1.25rem;max-width:1200px;width:100%;margin:0 auto}

/* ── VIEWS ── */
.view{display:none}
.view.active{display:block}

/* ── CALENDAR ── */
.cal-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.cal-header h2{font-size:17px;font-weight:600;flex:1;text-align:center}
.cal-nav{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:var(--radius-sm)}
.cal-nav:hover{background:var(--bg3)}
.bm-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid transparent;background:var(--bg3);color:var(--text2);transition:all .15s}
.pill:hover{border-color:var(--border2)}
.pill.active{color:#fff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day-name{text-align:center;font-size:11px;color:var(--text2);padding:6px 0;font-weight:500}
.day-cell{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px;min-height:78px;cursor:pointer;transition:all .15s;position:relative}
.day-cell:hover{border-color:var(--border2);background:var(--bg3)}
.day-cell.today{border-color:var(--blue2);border-width:2px}
.day-cell.selected{background:var(--bg3);border-color:var(--blue)}
.day-cell.other-m{opacity:.2}
.day-num{font-size:11px;font-weight:500;margin-bottom:3px;color:var(--text2)}
.day-cell.today .day-num{color:var(--blue2);font-weight:700}
.evt-chip{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;color:#fff}
.dl-chip{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:2px;font-weight:700;background:#FF6B00;color:#fff;display:flex;align-items:center;gap:2px}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:3px}

/* ── DAY DETAIL ── */
.day-detail{margin-top:12px}
.detail-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.detail-header h3{font-size:15px;font-weight:600}
.btn-sm{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:var(--radius-sm);font-size:12px;transition:all .15s}
.btn-sm:hover{background:var(--bg3);border-color:var(--border2)}
.prez-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;border-left:4px solid #888}
.prez-card-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.prez-brand{font-weight:700;font-size:15px;color:var(--text)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-white{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.badge-blue{background:#1d4ed8;color:#fff}
.badge-green{background:#166534;color:#86efac}
.badge-red{background:#7f1d1d;color:#fca5a5}
.prez-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.prez-field label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;display:block}
.prez-field .val{font-size:13px;color:var(--text)}
.dl-block{border-radius:var(--radius-sm);padding:8px 12px;display:flex;align-items:center;gap:10px;margin-top:6px}
.dl-block.ok{background:#1c2a1c;border:1px solid #2ea043}
.dl-block.soon{background:#2a1f00;border:1px solid #f59e0b}
.dl-block.urgent{background:#2a1200;border:1px solid #FF6B00}
.dl-block.past{background:#2a0a0a;border:1px solid #da3633}
.dl-block i{font-size:18px}
.dl-block.ok i{color:#2ea043}
.dl-block.soon i{color:#f59e0b}
.dl-block.urgent i{color:#FF6B00}
.dl-block.past i{color:#da3633}
.dl-block .dl-label{font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.dl-block.ok .dl-label{color:#2ea043}
.dl-block.soon .dl-label{color:#f59e0b}
.dl-block.urgent .dl-label{color:#FF6B00}
.dl-block.past .dl-label{color:#da3633}
.dl-block .dl-date{font-size:13px;font-weight:600;color:var(--text)}
.added-by{font-size:11px;color:var(--text3);margin-top:8px}
.edit-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:4px 8px;border-radius:var(--radius-sm);font-size:11px;margin-left:auto}
.edit-btn:hover{background:var(--bg3);color:var(--text)}
.edit-btn.hidden{display:none}

/* ── LIST VIEW ── */
.list-table{width:100%;border-collapse:collapse}
.list-table th{background:var(--bg2);border:1px solid var(--border);padding:8px 10px;text-align:left;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.list-table td{border:1px solid var(--border);padding:8px 10px;font-size:12px;color:var(--text);vertical-align:middle}
.list-table tr:hover td{background:var(--bg2)}
.list-table tr td{background:var(--bg)}
.sec-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.table-wrap{overflow-x:auto}

/* ── FORM ── */
.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;max-width:640px}
.form-title{font-size:16px;font-weight:600;margin-bottom:1.25rem;color:var(--text)}
.form-section{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.form-section.dl{color:#FF6B00}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;color:var(--text2);font-weight:500}
.form-group input,.form-group select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);transition:border .15s}
.form-group input:focus,.form-group select:focus{border-color:var(--blue2)}
.form-group select option{background:var(--bg3)}
.hotel-row{display:flex;gap:8px}
.hotel-row select{width:80px;flex-shrink:0}
.form-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn-save{background:var(--green);color:#fff;padding:8px 18px;border-radius:var(--radius-sm);font-weight:500;font-size:13px;transition:background .15s}
.btn-save:hover{background:var(--green2)}
.btn-cancel{background:var(--bg3);color:var(--text);padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border)}
.btn-cancel:hover{background:var(--bg4)}
.btn-delete{background:#7f1d1d;color:#fca5a5;padding:8px 14px;border-radius:var(--radius-sm);margin-left:auto;font-size:13px}
.btn-delete:hover{background:var(--red)}

/* ── STATUS ── */
.status-bar{position:fixed;bottom:16px;right:16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;font-size:12px;color:var(--text2);display:none;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.status-bar.show{display:flex;align-items:center;gap:8px}
.loading-overlay{position:fixed;inset:0;background:rgba(13,17,23,.8);display:none;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--blue2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:3rem;color:var(--text2)}
.empty-state i{font-size:40px;margin-bottom:12px;opacity:.4;display:block}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <i class="fa-regular fa-calendar-days"></i>
      <h1>Prezentacije SS27</h1>
      <p>Ko si ti?</p>
    </div>
    <div class="user-grid">
      <button class="user-btn" onclick="login('DARKO')">
        <div class="avatar" style="background:#1565C0">DK</div>
        <span>DARKO</span>
      </button>
      <button class="user-btn" onclick="login('BOBA')">
        <div class="avatar" style="background:#6A1B9A">BB</div>
        <span>BOBA</span>
      </button>
      <button class="user-btn" onclick="login('MILI')">
        <div class="avatar" style="background:#00796B">ML</div>
        <span>MILI</span>
      </button>
      <button class="user-btn" onclick="login('BANE')">
        <div class="avatar" style="background:#E65100">BN</div>
        <span>BANE</span>
      </button>
      <button class="user-btn full" onclick="login('PREGLED')">
        <div class="avatar" style="background:#374151">SV</div>
        <span>SAMO PREGLED</span>
      </button>
    </div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app-screen" style="display:none;flex-direction:column">
  <div class="topbar">
    <div class="topbar-logo"><i class="fa-regular fa-calendar-days"></i> SS27</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showView('calendar')" id="tab-calendar"><i class="fa-regular fa-calendar"></i> Kalendar</button>
      <button class="nav-tab" onclick="showView('list')" id="tab-list"><i class="fa-solid fa-list"></i> Lista</button>
    </div>
    <button class="btn-add" id="btn-add-top" onclick="openForm(null,null)"><i class="fa-solid fa-plus"></i> Dodaj</button>
    <div class="topbar-user">
      <div class="avatar-sm" id="top-avatar"></div>
      <span id="top-username" style="font-size:13px;font-weight:500"></span>
    </div>
    <button class="logout-btn" onclick="logout()" title="Odjava"><i class="fa-solid fa-right-from-bracket"></i></button>
  </div>

  <div class="main-content">
    <!-- CALENDAR -->
    <div class="view active" id="view-calendar">
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
        <h2 id="month-label"></h2>
        <button class="cal-nav" onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
        <button class="cal-nav" onclick="goToday()">Danas</button>
      </div>
      <div class="bm-filters" id="bm-filters"></div>
      <div class="cal-grid" id="cal-names"></div>
      <div class="cal-grid" style="margin-top:3px" id="cal-grid"></div>
      <div class="legend" id="legend"></div>
      <div class="day-detail" id="day-detail"></div>
    </div>

    <!-- LIST -->
    <div class="view" id="view-list">
      <div class="bm-filters" id="list-filters" style="margin-bottom:12px"></div>
      <div id="list-content"></div>
    </div>

    <!-- FORM -->
    <div class="view" id="view-form">
      <div class="form-card">
        <div class="form-title" id="form-title">Nova prezentacija</div>
        <input type="hidden" id="edit-id">

        <div class="form-grid">
          <div class="form-group">
            <label>Datum prezentacije *</label>
            <input type="date" id="f-datum">
          </div>
          <div class="form-group">
            <label>Brend *</label>
            <select id="f-brend">
              <option value="">— odaberi —</option>
              <option>ADIDAS</option><option>NIKE</option><option>PUMA</option>
              <option>NEW BALANCE</option><option>KRONOS</option><option>KRONOS SU</option>
              <option>UNDER ARMOUR</option><option>HOKA</option><option>UMBRO</option>
              <option>SKECHERS</option><option>LOTTO</option><option>ACTION</option>
              <option>SLAZENGER</option><option>SERGIO T.</option><option>KANDER</option><option>HADDAD</option>
            </select>
          </div>
        </div>

        <div class="form-grid three">
          <div class="form-group">
            <label>Divizija</label>
            <select id="f-div"><option value="">—</option><option>FTW</option><option>APP</option><option>SVE</option><option>EQU</option></select>
          </div>
          <div class="form-group">
            <label>Brand menadžer</label>
            <select id="f-bm"><option value="">—</option><option>BOBA</option><option>MILI</option><option>BANE</option><option>SVI</option></select>
          </div>
          <div class="form-group">
            <label>Lokacija</label>
            <select id="f-lok"><option value="">—</option><option>BGD</option><option>ATINA</option><option>BUDIMPEŠTA</option></select>
          </div>
        </div>

        <div class="form-section dl"><i class="fa-regular fa-clock"></i> DL — rok za predaju</div>
        <div class="form-grid">
          <div class="form-group">
            <label>DL datum</label>
            <input type="date" id="f-dl">
          </div>
          <div class="form-group">
            <label>Napomena DL</label>
            <input type="text" id="f-dl-note" placeholder="npr. order forma do 20h...">
          </div>
        </div>

        <div class="form-section"><i class="fa-solid fa-car"></i> Prevoz &amp; smještaj</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Registracija auta</label>
            <input type="text" id="f-auto" placeholder="npr. ŠKODA KAMIQ T06-A-205">
          </div>
          <div class="form-group">
            <label>Hotel</label>
            <div class="hotel-row">
              <select id="f-hotel-da-ne" onchange="toggleHotel()">
                <option value="ne">NE</option>
                <option value="da">DA</option>
              </select>
              <input type="text" id="f-hotel-naziv" placeholder="Naziv hotela..." style="display:none;flex:1">
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn-save" onclick="saveEvent()"><i class="fa-solid fa-check"></i> Spremi</button>
          <button class="btn-cancel" onclick="cancelForm()">Odustani</button>
          <button class="btn-delete" id="btn-delete" style="display:none" onclick="deleteEvent()"><i class="fa-solid fa-trash"></i> Obriši</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <span style="color:var(--text2);font-size:13px">Učitavanje...</span>
</div>

<div class="status-bar" id="status-bar"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// JSONBin.io - besplatan JSON storage
// VAŽNO: Nakon što napraviš account na jsonbin.io, zamijeni ove vrijednosti!
const JSONBIN_URL = 'https://api.jsonbin.io/v3/b/TVOJ_BIN_ID';
const JSONBIN_KEY = '$2a$10$TVOJ_API_KLJUC';
// Dok ne postaviš JSONBin, podaci se čuvaju lokalno (localStorage)
const USE_LOCAL = true; // Promijeni na false kada postaviš JSONBin

const MONTHS=['Januar','Februar','Mart','April','Maj','Juni','Juli','August','Septembar','Oktobar','Novembar','Decembar'];
const DAYS=['Ned','Pon','Uto','Sri','Čet','Pet','Sub'];

const BM_CFG={
  BOBA:{bg:'#6A1B9A',label:'BOBA'},
  MILI:{bg:'#00796B',label:'MILI'},
  BANE:{bg:'#E65100',label:'BANE'},
  SVI:{bg:'#1565C0',label:'SVI'},
};
const LOK_CFG={BGD:'#1565C0',ATINA:'#00796B','BUDIMPEŠTA':'#6A1B9A'};
const DIV_CFG={FTW:'#0277BD',APP:'#558B2F',SVE:'#6A1B9A',EQU:'#E65100'};
const USER_CFG={
  DARKO:{bg:'#1565C0',av:'DK',canEdit:true},
  BOBA:{bg:'#6A1B9A',av:'BB',canEdit:true},
  MILI:{bg:'#00796B',av:'ML',canEdit:true},
  BANE:{bg:'#E65100',av:'BN',canEdit:true},
  PREGLED:{bg:'#374151',av:'SV',canEdit:false},
};

const DEMO_DATA=[
  {id:'d1',datum:'2026-04-01',brend:'KRONOS',div:'APP',bm:'BOBA',lok:'BGD',dl:'2026-05-20',dlNote:'',auto:'ŠKODA KAMIQ T06-A-205',hotelDa:false,hotel:'',addedBy:'DARKO'},
  {id:'d2',datum:'2026-04-07',brend:'SLAZENGER',div:'FTW',bm:'MILI',lok:'BGD',dl:'',dlNote:'',auto:'ŠKODA OCTVIA T51-A-A234',hotelDa:false,hotel:'',addedBy:'DARKO'},
  {id:'d3',datum:'2026-04-15',brend:'UMBRO',div:'APP',bm:'BOBA',lok:'BGD',dl:'2026-05-06',dlNote:'',auto:'ŠKODA OCTVIA T51-A-A234',hotelDa:false,hotel:'',addedBy:'BOBA'},

// ── STATE ────────────────────────────────────────────────────────────────────
let currentUser=null,curYear=new Date().getFullYear(),curMonth=new Date().getMonth();
let selectedDate=null,events=[],editingId=null,filterBM='',prevView='calendar';

// ── STORAGE ──────────────────────────────────────────────────────────────────
async function loadData(){
  showLoading(true);
  try{
    if(USE_LOCAL){
      const d=localStorage.getItem('prez-ss27');
      events=d?JSON.parse(d):[...DEMO_DATA];
    } else {
      const r=await fetch(JSONBIN_URL+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY}});
      const j=await r.json();
      events=j.record.events||[];
    }
  }catch(e){events=[...DEMO_DATA];}
  showLoading(false);
}

async function saveData(){
  try{
    if(USE_LOCAL){
      localStorage.setItem('prez-ss27',JSON.stringify(events));
    } else {
      await fetch(JSONBIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},body:JSON.stringify({events})});
    }
    showStatus('✓ Sačuvano','#2ea043');
  }catch(e){showStatus('⚠ Greška pri čuvanju','#da3633');}
}

// ── UI HELPERS ───────────────────────────────────────────────────────────────
function showLoading(v){document.getElementById('loading').style.display=v?'flex':'none';}
function showStatus(msg,color='#8b949e'){
  const el=document.getElementById('status-bar');
  el.textContent=msg;el.style.color=color;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}
function fmtD(ds){if(!ds)return'—';const p=ds.split('-');return p[2]+'.'+p[1]+'.'+p[0]+'.';}
function todayStr(){return new Date().toISOString().slice(0,10);}
function dlStatus(dl){
  if(!dl)return null;
  const diff=Math.ceil((new Date(dl+'T00:00:00')-new Date(new Date().toDateString()))/86400000);
  if(diff<0)return'past';if(diff<=7)return'urgent';if(diff<=14)return'soon';return'ok';
}

// ── AUTH ─────────────────────────────────────────────────────────────────────
function login(u){
  currentUser=u;
  const cfg=USER_CFG[u];
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
  const av=document.getElementById('top-avatar');
  av.style.background=cfg.bg;av.textContent=cfg.av;
  document.getElementById('top-username').textContent=u;
  document.getElementById('btn-add-top').style.display=cfg.canEdit?'flex':'none';
  loadData().then(()=>{showView('calendar');renderCalendar();});
}
function logout(){
  currentUser=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';
}

// ── VIEWS ────────────────────────────────────────────────────────────────────
function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if(document.getElementById('tab-'+v))document.getElementById('tab-'+v).classList.add('active');
  if(v==='calendar')renderCalendar();
  if(v==='list')renderList();
}

// ── FILTERS ──────────────────────────────────────────────────────────────────
function buildFilters(containerId,cb){
  const el=document.getElementById(containerId);
  let html=`<button class="pill${!filterBM?' active':''}" style="${!filterBM?'background:#21262d;color:#e6edf3;border-color:#484f58':''}" onclick="setFilter('','${containerId}','${cb}')">Svi</button>`;
  Object.entries(BM_CFG).forEach(([bm,c])=>{
    const a=filterBM===bm;
    html+=`<button class="pill${a?' active':''}" style="color:${c.bg};${a?'background:'+c.bg+';color:#fff;border-color:'+c.bg:''}" onclick="setFilter('${bm}','${containerId}','${cb}')">${bm}</button>`;
  });
  el.innerHTML=html;
}
function setFilter(bm,cid,cb){filterBM=bm;buildFilters(cid,cb);window[cb]&&window[cb]();}

// ── CALENDAR ─────────────────────────────────────────────────────────────────
function changeMonth(d){curMonth+=d;if(curMonth>11){curMonth=0;curYear++;}else if(curMonth<0){curMonth=11;curYear--;}renderCalendar();}
function goToday(){curYear=new Date().getFullYear();curMonth=new Date().getMonth();renderCalendar();}

function renderCalendar(){
  document.getElementById('month-label').textContent=MONTHS[curMonth]+' '+curYear;
  buildFilters('bm-filters','renderCalendar');

  const names=document.getElementById('cal-names');
  names.innerHTML=DAYS.map(d=>`<div class="day-name">${d}</div>`).join('');

  const today=todayStr();
  const first=new Date(curYear,curMonth,1),startDay=first.getDay();
  const dim=new Date(curYear,curMonth+1,0).getDate();
  const dipm=new Date(curYear,curMonth,0).getDate();

  let cells=[];
  for(let i=0;i<startDay;i++){
    const d=dipm-startDay+1+i,mo=curMonth===0?12:curMonth,yr=curMonth===0?curYear-1:curYear;
    cells.push({day:d,ds:`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`,curr:false});
  }
  for(let d=1;d<=dim;d++)cells.push({day:d,ds:`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,curr:true});
  let nd=1;while(cells.length<42){
    const nm=curMonth+1>11?0:curMonth+1,ny=curMonth+1>11?curYear+1:curYear;
    cells.push({day:nd,ds:`${ny}-${String(nm+1).padStart(2,'0')}-${String(nd).padStart(2,'0')}`,curr:false});nd++;
  }

  const evMap={},dlMap={};
  const filtered=filterBM?events.filter(e=>e.bm===filterBM):events;
  filtered.forEach(e=>{
    if(!evMap[e.datum])evMap[e.datum]=[];evMap[e.datum].push(e);
    if(e.dl){if(!dlMap[e.dl])dlMap[e.dl]=[];dlMap[e.dl].push(e);}
  });

  const grid=document.getElementById('cal-grid');
  grid.innerHTML=cells.map(c=>{
    const isT=c.ds===today,isSel=c.ds===selectedDate;
    const evs=evMap[c.ds]||[],dls=dlMap[c.ds]||[];
    let inner='';
    if(dls.length)inner+=`<div class="dl-chip"><i class="fa-solid fa-triangle-exclamation" style="font-size:8px"></i> DL${dls.length>1?' x'+dls.length:''}</div>`;
    inner+=evs.slice(0,2).map(e=>`<div class="evt-chip" style="background:${(BM_CFG[e.bm]||{bg:'#555'}).bg}">${e.brend}</div>`).join('');
    if(evs.length>2)inner+=`<div class="evt-chip" style="background:#374151">+${evs.length-2}</div>`;
    return`<div class="day-cell${!c.curr?' other-m':''}${isT?' today':''}${isSel?' selected':''}" onclick="selectDay('${c.ds}')">
      <div class="day-num">${c.day}</div>${inner}</div>`;
  }).join('');

  const leg=document.getElementById('legend');
  leg.innerHTML=Object.entries(BM_CFG).map(([bm,c])=>`<div class="legend-item"><div class="legend-dot" style="background:${c.bg}"></div>${bm}</div>`).join('');
  leg.innerHTML+=`<div class="legend-item"><div class="legend-dot" style="background:#FF6B00"></div>DL rok</div>`;

  if(selectedDate)renderDayDetail(selectedDate);
}

function selectDay(ds){selectedDate=ds;renderCalendar();}

function renderDayDetail(ds){
  const el=document.getElementById('day-detail');
  const filtered=filterBM?events.filter(e=>e.bm===filterBM):events;
  const dayEvs=filtered.filter(e=>e.datum===ds);
  const dayDLs=filtered.filter(e=>e.dl===ds);
  const canEdit=USER_CFG[currentUser]?.canEdit;

  if(!dayEvs.length&&!dayDLs.length){
    el.innerHTML=`<div class="empty-state"><i class="fa-regular fa-calendar-xmark"></i>${fmtD(ds)} — nema unosa.${canEdit?` <button class="btn-sm" onclick="openForm(null,'${ds}')"><i class="fa-solid fa-plus"></i> Dodaj</button>`:''}</div>`;
    return;
  }

  let html=`<div class="detail-header"><h3>${fmtD(ds)}</h3>${canEdit?`<button class="btn-sm" onclick="openForm(null,'${ds}')"><i class="fa-solid fa-plus"></i> Dodaj</button>`:''}</div>`;

  if(dayDLs.length){
    html+=`<div style="background:#1a0e00;border:1.5px solid #FF6B00;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <i class="fa-solid fa-triangle-exclamation" style="font-size:20px;color:#FF6B00"></i>
      <div><div style="font-size:10px;font-weight:700;color:#FF6B00;text-transform:uppercase;letter-spacing:.05em">DL ROK ZA PREDAJU</div>
      <div style="font-size:13px;font-weight:500;color:#e6edf3">${dayDLs.map(e=>e.brend+(e.dlNote?' — '+e.dlNote:'')).join(' | ')}</div></div>
    </div>`;
  }

  dayEvs.forEach(e=>{
    const bc=(BM_CFG[e.bm]||{bg:'#555'}).bg;
    const st=dlStatus(e.dl);
    const stMap={ok:{cls:'ok',icon:'fa-circle-check',lbl:'DL — OK'},soon:{cls:'soon',icon:'fa-clock',lbl:'DL ZA 2 SEDMICE'},urgent:{cls:'urgent',icon:'fa-triangle-exclamation',lbl:'DL USKORO!'},past:{cls:'past',icon:'fa-circle-xmark',lbl:'DL PROŠAO'}};
    const stCfg=st?stMap[st]:null;

    html+=`<div class="prez-card" style="border-left-color:${bc}">
      <div class="prez-card-top">
        <span class="prez-brand">${e.brend}</span>
        ${e.div?`<span class="badge badge-white">${e.div}</span>`:''}
        ${e.bm?`<span class="badge" style="background:${bc};color:#fff">${e.bm}</span>`:''}
        ${e.lok?`<span class="badge badge-blue"><i class="fa-solid fa-location-dot" style="font-size:10px"></i> ${e.lok}</span>`:''}
        ${canEdit?`<button class="edit-btn" onclick="openForm('${e.id}',null)"><i class="fa-solid fa-pen"></i></button>`:''}
      </div>
      <div class="prez-grid">
        <div class="prez-field"><label><i class="fa-solid fa-car"></i> Auto</label><div class="val">${e.auto||'<span style="color:#6e7681">—</span>'}</div></div>
        <div class="prez-field"><label><i class="fa-solid fa-hotel"></i> Hotel</label><div class="val">
          ${e.hotelDa?`<span class="badge badge-green"><i class="fa-solid fa-check"></i> DA</span> <span style="font-size:12px;color:#8b949e">${e.hotel||''}</span>`:`<span class="badge badge-red"><i class="fa-solid fa-xmark"></i> NE</span>`}
        </div></div>
      </div>
      ${stCfg?`<div class="dl-block ${stCfg.cls}"><i class="fa-solid ${stCfg.icon}"></i><div><div class="dl-label">${stCfg.lbl}</div><div class="dl-date">${fmtD(e.dl)}${e.dlNote?' — '+e.dlNote:''}</div></div></div>`:''}
      <div class="added-by">Unio: ${e.addedBy||'—'}</div>
    </div>`;
  });
  el.innerHTML=html;
}

// ── LIST VIEW ────────────────────────────────────────────────────────────────
function renderList(){
  buildFilters('list-filters','renderList');
  const canEdit=USER_CFG[currentUser]?.canEdit;
  let filtered=(filterBM?events.filter(e=>e.bm===filterBM):events).sort((a,b)=>a.datum.localeCompare(b.datum));
  const today=todayStr();
  const up=filtered.filter(e=>e.datum>=today);
  const pa=filtered.filter(e=>e.datum<today);

  const row=e=>{
    const bc=(BM_CFG[e.bm]||{bg:'#555'}).bg;
    const st=dlStatus(e.dl);
    const dlColors={ok:'#2ea043',soon:'#f59e0b',urgent:'#FF6B00',past:'#da3633'};
    return`<tr>
      <td style="white-space:nowrap">${fmtD(e.datum)}</td>
      <td><strong>${e.brend}</strong></td>
      <td>${e.div?`<span style="background:${(DIV_CFG[e.div]||'#555')};color:#fff;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:600">${e.div}</span>`:''}</td>
      <td>${e.bm?`<span style="background:${bc};color:#fff;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600">${e.bm}</span>`:''}</td>
      <td>${e.lok?`<span style="background:${(LOK_CFG[e.lok]||'#555')};color:#fff;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:600">${e.lok}</span>`:''}</td>
      <td>${e.dl?`<span style="color:${dlColors[st]||'#8b949e'};font-weight:600">${fmtD(e.dl)}</span>`:''}</td>
      <td style="font-size:11px;color:#8b949e">${e.auto||'—'}</td>
      <td>${e.hotelDa?`<span class="badge badge-green"><i class="fa-solid fa-check"></i> DA</span>`:`<span class="badge badge-red">NE</span>`}</td>
      ${canEdit?`<td><button class="edit-btn" onclick="openForm('${e.id}',null)"><i class="fa-solid fa-pen"></i></button></td>`:'<td></td>'}
    </tr>`;
  };

  const thead=`<thead><tr><th>DATUM</th><th>BREND</th><th>DIV</th><th>BM</th><th>LOKACIJA</th><th>DL</th><th>AUTO</th><th>HOTEL</th><th></th></tr></thead>`;
  let html='';
  if(!filtered.length){html='<div class="empty-state"><i class="fa-regular fa-calendar-xmark"></i>Nema podataka.</div>';}
  if(up.length)html+=`<div class="sec-title">Nadolazeće — ${up.length}</div><div class="table-wrap"><table class="list-table">${thead}<tbody>${up.map(row).join('')}</tbody></table></div>`;
  if(pa.length)html+=`<div class="sec-title" style="margin-top:1.5rem;opacity:.5">Prošle — ${pa.length}</div><div class="table-wrap" style="opacity:.5"><table class="list-table">${thead}<tbody>${pa.map(row).join('')}</tbody></table></div>`;
  document.getElementById('list-content').innerHTML=html;
}

// ── FORM ─────────────────────────────────────────────────────────────────────
function toggleHotel(){document.getElementById('f-hotel-naziv').style.display=document.getElementById('f-hotel-da-ne').value==='da'?'block':'none';}

function openForm(id,date){
  editingId=id;
  prevView=document.querySelector('.view.active')?.id?.replace('view-','')||'calendar';
  if(id){
    const e=events.find(x=>x.id===id);if(!e)return;
    document.getElementById('form-title').textContent='Uredi prezentaciju';
    document.getElementById('btn-delete').style.display='block';
    document.getElementById('edit-id').value=id;
    document.getElementById('f-datum').value=e.datum||'';
    document.getElementById('f-brend').value=e.brend||'';
    document.getElementById('f-div').value=e.div||'';
    document.getElementById('f-bm').value=e.bm||'';
    document.getElementById('f-lok').value=e.lok||'';
    document.getElementById('f-dl').value=e.dl||'';
    document.getElementById('f-dl-note').value=e.dlNote||'';
    document.getElementById('f-auto').value=e.auto||'';
    document.getElementById('f-hotel-da-ne').value=e.hotelDa?'da':'ne';
    document.getElementById('f-hotel-naziv').value=e.hotel||'';
    document.getElementById('f-hotel-naziv').style.display=e.hotelDa?'block':'none';
  } else {
    document.getElementById('form-title').textContent='Nova prezentacija';
    document.getElementById('btn-delete').style.display='none';
    document.getElementById('edit-id').value='';
    ['f-dl','f-dl-note','f-auto','f-hotel-naziv'].forEach(id=>document.getElementById(id).value='');
    ['f-brend','f-div','f-bm','f-lok'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-datum').value=date||'';
    document.getElementById('f-hotel-da-ne').value='ne';
    document.getElementById('f-hotel-naziv').style.display='none';
  }
  showView('form');
}

function cancelForm(){editingId=null;showView(prevView||'calendar');}

async function saveEvent(){
  const datum=document.getElementById('f-datum').value;
  const brend=document.getElementById('f-brend').value;
  if(!datum||!brend){alert('Datum i brend su obavezni!');return;}
  const ev={
    id:editingId||('e'+Date.now()),
    datum,brend,
    div:document.getElementById('f-div').value,
    bm:document.getElementById('f-bm').value,
    lok:document.getElementById('f-lok').value,
    dl:document.getElementById('f-dl').value,
    dlNote:document.getElementById('f-dl-note').value,
    auto:document.getElementById('f-auto').value,
    hotelDa:document.getElementById('f-hotel-da-ne').value==='da',
    hotel:document.getElementById('f-hotel-naziv').value,
    addedBy:currentUser,
  };
  if(editingId){events=events.map(e=>e.id===editingId?ev:e);}
  else{events.push(ev);}
  await saveData();
  editingId=null;
  selectedDate=datum;
  curYear=parseInt(datum.slice(0,4));curMonth=parseInt(datum.slice(5,7))-1;
  showView('calendar');
}

async function deleteEvent(){
  if(!confirm('Obriši ovu prezentaciju?'))return;
  events=events.filter(e=>e.id!==document.getElementById('edit-id').value);
  await saveData();
  editingId=null;
  showView(prevView||'calendar');
}
